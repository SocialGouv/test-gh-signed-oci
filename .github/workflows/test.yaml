name: build-and-sign
on:
  workflow_dispatch:      # only manual runs → signer is a real user

permissions:              # required scopes
  id-token: write         # OIDC token for Cosign
  packages: write         # push to ghcr.io
  contents: read

jobs:
  sign-image:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE: socialgouv/${{ github.event.repository.name }}
      TAG:   ${{ github.sha }}             # immutable tag

    steps:
      - uses: actions/checkout@v4

      # 1. Build the image --------------------------------------------------
      - name: Build
        run: docker build -t $REGISTRY/$IMAGE:$TAG .

      # 2. Push the (unsigned) layers --------------------------------------
      - name: Push layers
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push $REGISTRY/$IMAGE:$TAG

      # 3. Install the latest Cosign v2 (pin if you need to) ---------------
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.5.0'         # ← optional but explicit

      # 4. Key-less sign (no --keyless flag any more) ----------------------
      - name: Sign with caller identity
        run: |
          cosign sign --yes $REGISTRY/$IMAGE:$TAG
